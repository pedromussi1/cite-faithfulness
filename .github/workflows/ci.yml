name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (metric + tests, no torch)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check citeval tests
      - name: Unit tests (KeywordNLI — no model download)
        run: pytest -q
      - name: Offline demo runs
        run: python -m citeval.demo
